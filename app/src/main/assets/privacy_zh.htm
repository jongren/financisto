    <h2>隱私權政策</h2>
    <p>當您使用 Financisto Classic 時，除非您主動提供，否則本應用程式不會收集您的任何個人識別資訊。</p>
    <p>Financisto Classic 是一款本機單機應用程式，沒有任何後端伺服器架構，且不會在您的本機裝置之外儲存任何資料。您可以選擇手動授權將您的資料備份上傳至您的個人雲端空間（如 Google Drive 或 Dropbox）。這些備份檔案皆存放在您個人的私人空間中，不會與任何其他人共享。</p>
    <p>您可以選擇使用裝置的相機拍攝照片並附加至交易記錄。這些照片僅儲存在您的本機裝置中，絕不會分享至本機之外的任何地方。</p>
